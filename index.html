<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cairo Korean School</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cairo',sans-serif;
background:#f5f7fb;
}

header{
background:linear-gradient(90deg,#0f2027,#203a43,#2c5364);
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:600;
}

.hero{
height:80vh;
background:url('https://images.unsplash.com/photo-1538485399081-7c8979f8a7e8') center/cover;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
color:white;
text-align:center;
}

.hero h1{
font-size:50px;
margin-bottom:10px;
}

.hero p{
font-size:20px;
}

.btn{
margin-top:20px;
padding:12px 30px;
background:#ff4d4d;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

.section{
padding:70px 20px;
text-align:center;
}

.cards{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
margin-top:40px;
}

.card{
background:white;
padding:30px;
width:260px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
}

footer{
background:#111;
color:white;
padding:20px;
text-align:center;
}

</style>
</head>

<body>

<header>
<div class="logo">Cairo Korean School</div>

<nav>
<a href="#">الرئيسية</a>
<a href="#">الكورسات</a>
<a href="#">عن الأكاديمية</a>
<a href="#">تواصل</a>
</nav>
</header>

<section class="hero">

<h1>تعلم اللغة الكورية</h1>
<p>ابدأ رحلتك نحو كوريا الآن</p>

<button class="btn">ابدأ التعلم</button>

</section>

<section class="section">

<h2>خدماتنا</h2>

<div class="cards">

<div class="card">
<h3>كورسات كورية</h3>
<p>تعلم اللغة من الصفر حتى الاحتراف</p>
</div>

<div class="card">
<h3>الثقافة الكورية</h3>
<p>تعرف على الثقافة والتقاليد الكورية</p>
</div>

<div class="card">
<h3>الدراسة في كوريا</h3>
<p>مساعدة في التقديم للجامعات الكورية</p>
</div>

</div>

</section>

<footer>

© 2026 Cairo Korean School

</footer>

</body>
</html>
